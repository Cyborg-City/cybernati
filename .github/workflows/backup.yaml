name: Periodic Vault Backup

on:
  schedule:
    # Run at 9 AM on Monday, Wednesday, and Friday
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v4
          fetch-depth: 0

      - name: Push to backup branch
        run: |
          # Push v4 branch to backup branch (force to keep as mirror)
          git push origin v4:backup --force